<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldwideAuraRugs Business Suite</title>
<link rel="stylesheet" href="style.css">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fb;
}

header{
background:#0B3D91;
color:white;
padding:20px;
text-align:center;
}

header h1{
font-size:28px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
text-align:center;
transition:.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-5px);
}

.card h2{
margin-bottom:10px;
color:#0B3D91;
}

<button onclick="window.location.href='profit.html'">
Open
</button>
}

footer{
text-align:center;
padding:20px;
color:#666;
}
</style>

</head>

<body>

<header>
<h1>WorldwideAuraRugs Business Suite</h1>
<p>Shipping • Etsy • Profit • Invoice</p>
</header>

<div class="container">

<div class="card">
<h2>📦 Shipping Calculator</h2>
<p>DHL • FedEx • UPS</p>
<button>Open</button>
</div>

<div class="card">
<h2>💰 Etsy Profit</h2>
<p>Profit Calculator</p>
<button>Open</button>
</div>

<div class="card">
<h2>📄 Invoice</h2>
<p>Commercial Invoice</p>
<button>Open</button>
</div>

<div class="card">
<h2>📦 Packing Slip</h2>
<p>Generate Packing Slip</p>
<button>Open</button>
</div>

</div>

<footer>
© WorldwideAuraRugs Business Suite
</footer>

</body>
</html>
